appId: com.solvestoneworks.auditexcel
productName: Audit Excel Generator
copyright: Copyright © 2024 SolveStone Works

directories:
  buildResources: resources
  output: dist

# Only ship the compiled output and package.json.
# electron-builder adds production node_modules automatically from package.json dependencies.
files:
  - out/**/*
  - package.json

# prompts/system.md must live OUTSIDE the asar archive so the main process
# can reach it via process.resourcesPath at runtime.
extraResources:
  - from: prompts/
    to: prompts/

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico          # NSIS requires a real .ico file

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.png          # electron-builder converts PNG → .icns on macOS runner
  category: public.app-category.business
  hardenedRuntime: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
