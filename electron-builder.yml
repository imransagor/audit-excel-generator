appId: com.solvestoneworks.auditexcel
productName: Audit Excel Generator
copyright: Copyright © 2024 SolveStone Works

directories:
  buildResources: resources
  output: dist

# Only ship the compiled output and package.json.
# electron-builder adds production node_modules automatically from package.json dependencies.
files:
  - out/**/*
  - package.json

# prompts/system.md must live OUTSIDE the asar archive so the main process
# can reach it via process.resourcesPath at runtime.
extraResources:
  - from: prompts/
    to: prompts/

# Single PNG icon — electron-builder converts to .ico / .icns per platform.
# Replace resources/icon.png with your own 512×512 PNG for a custom icon.
icon: resources/icon.png

win:
  target:
    - target: nsis
      arch: [x64]

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.business
  hardenedRuntime: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: resources/icon.png
  uninstallerIcon: resources/icon.png

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
